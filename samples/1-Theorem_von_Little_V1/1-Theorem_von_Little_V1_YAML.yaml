# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: Theorem von Little
  explanation: Nutzen Sie das Lernmodul, um die Formel des Theorems von Little anzuwenden.
  sources:
    - Skript von Herr Professor Wißmann
    - Internet
  contacts:
    - name: Professor Dr. Dieter Wißmann
      purpose: Fachliche Fragen
      data:
        Telefon: 09561 317-152
        E-Mail: dieter.wissmann@hs-coburg.de
        Büro: 2-127
    - name: Professor Dr. Dieter Wißmann
      purpose: Technische Fragen
      data:
        Telefon: 09561 317-152
        E-Mail: dieter.wissmann@hs-coburg.de
        Büro: 2-127
  settings:
    lemosVersion: 2.0.0
    showFieldIDs: true
    differentStepSizes: false

fields:
  - id: "T"
    name: "Aufgabentyp"
    explanation: "Auswahl, welche Variante der Formel genutzt werden soll"
    type: SELECT
    options:
      - id: Auto
        name: Automatisch
        explanation: Berechnung des leer gelassenen Felds
      - id: Fall1
        name: Länge gesucht
        explanation: Y und W gegeben, N gesucht
      - id: Fall2
        name: Ankunftsrate gesucht
        explanation: N und W gegeben, Y gesucht
      - id: Fall3
        name: Wartezeit gesucht
        explanation: N und Y gegeben, W gesucht
  - id: "N"
    name: Länge
    explanation: Durchschnittliche Länge der Warteschlange
    type: TEXT
    usage: INPUT
    allowEmpty: true
    datatype: NUMBER
    restrictions:
      - errorMessage: Nur positive Zahlenwerte, ${N.value} ist ein negativer Wert
        terms:
          - Number.isNaN(N.value) || N >= 0   # Number.isNaN() erforderlich, da Feld leer sein und Restriktionen dadurch auch bei leerem Feld geprüft werden können (konvertiert zu NaN)
  - id: "Y"
    name: Ankunftsrate
    explanation: Durchschnittliche Ankunftsrate neuer Einträge
    type: TEXT
    usage: INPUT
    allowEmpty: true
    datatype: NUMBER
    restrictions:
      - errorMessage: Nur positive Zahlenwerte
        terms:
          - Number.isNaN(Y.value) || Y >= 0   # Number.isNaN() erforderlich, da Feld leer sein kann und Restriktionen dadurch auch bei leerem Feld geprüft werden (konvertiert zu NaN)
  - id: "W"
    name: Wartezeit
    explanation: Durchschnittliche Wartezeit eines Eintrags
    type: TEXT
    usage: INPUT
    allowEmpty: true
    datatype: NUMBER
    restrictions:
      - errorMessage: Nur positive Zahlenwerte
        terms:
          - Number.isNaN(W.value) || W >= 0   # Number.isNaN() erforderlich, da Feld leer sein kann und Restriktionen dadurch auch bei leerem Feld geprüft werden (konvertiert zu NaN)
states:
  - id: Z0
    name: Lernmodul initialisiert
    explanation: Einstieg
    type: ENTRY
    actions:
      - |
        switch(T.value)
        {
          case "Fall1": N.setEnabled(false); break;
          case "Fall2": Y.setEnabled(false); break;
          case "Fall3": W.setEnabled(false); break;
        }
    transitions:
      - target: Z1a
        name: Z0-Z1a
        explanation: Übergang zur Fallunterscheidung mit festem Aufgabentyp
        conditions:
          - terms:
              - T.getValue() !== "Auto"
      - target: Z1b
        name: Z0-Z1b
        explanation: Übergang zur Fallunterscheidung mit automatischem Aufgabentyp
        conditions:
          - errorMessage: "Bitte genau 2 der 3 Textfelder befüllen"
            terms:
              - Fields.countFilled() === 3
  - id: Z1a
    name: Welcher Aufgabentyp?
    explanation: Fallunterscheidung bei festem Aufgabentyp
    type: JUNCTION
    transitions:
      - target: Z2a
        name: Z1a-Z2a
        explanation: Fester Übergang zu Fall 1
        conditions:
          - errorMessage: ""
            terms:
              - T.getValue() === "Fall1"
          - errorMessage: "Bitte die Felder \"Ankunftsrate\" und 'Wartezeiten' ausfüllen"
            terms:
              - Fields.areFilled(Y, W)
      - target: Z2b
        name: Z1a-Z2b
        explanation: Fester Übergang zu Fall 2
        conditions:
          - errorMessage: ""
            terms:
              - T.getValue() === "Fall2"
          - errorMessage: Bitte die Felder \"Länge\" und 'Wartezeiten' ausfüllen
            terms:
              - Fields.areFilled(N, W)
      - target: Z2c
        name: Z1a-Z2c
        explanation: Fester Übergang zu Fall 3
        conditions:
          - errorMessage: ""
            terms:
              - T.getValue() === "Fall3"
          - errorMessage: Bitte die Felder "Länge" und 'Ankunftsrate' ausfüllen
            terms:
              - Fields.areFilled(N, Y)
  - id: Z1b
    name: Welche Felder?
    explanation: Fallunterscheidung bei automatischem Aufgabentyp
    type: JUNCTION
    transitions:
      - target: Z2a
        name: Z1b-Z2a
        explanation: Automatischer Übergang zu Fall 1
        conditions:
          - errorMessage: ""
            terms:
              - Fields.areFilled(Y, W)
      - target: Z2b
        name: Z1b-Z2b
        explanation: Automatischer Übergang zu Fall 2
        conditions:
          - errorMessage: ""
            terms:
              - Fields.areFilled(N, W)
      - target: Z2c
        name: Z1b-Z2c
        explanation: Automatischer Übergang zu Fall 3
        conditions:
          - errorMessage: ""
            terms:
              - Fields.areFilled(N, Y)
  - id: Z2a
    name: Länge berechnet
    explanation: "Fall 1: Y und W gegeben, N gesucht"
    type: STATE
    importance: HIGH
    actions:
      - N.value = Y * W
  - id: Z2b
    name: Ankunftsrate berechnet
    explanation: "Fall 2: N und W gegeben, Y gesucht"
    type: STATE
    importance: HIGH
    actions:
      - Y.value = N / W
  - id: Z2c
    name: Wartezeit berechnet
    explanation: "Fall 3: N und Y gegeben, W gesucht"
    type: STATE
    importance: HIGH
    actions:
      - W.value = N / Y
