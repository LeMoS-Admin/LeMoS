# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: Modul zum Testen aller Systemfunktionen
  explanation: |
    Lernmodul, dass alle möglichen Systemfunktionen mindestens einmal ausführt und das Ergebnis vergleicht<br>
    Hinweis: Die Szenarioauswahl funktioniert hier nicht, da es für dieses Modul eigentlich kein Szenario gibt,
    die Konfiguration aber im gleichen Ordner wie die anderen Testmodule liegt, um die Ressourcen nicht doppelt speichern zu müssen.
  settings:
    lemosVersion: 2.1.0
    showFieldIDs: true
    numberedOutput: true
    differentStepSizes: false
  logger:
    minWidth: 200
    minHeight: 20
  variables:
    - name: errors
      initialisation: "[]"
  imports:
    - name: TestLib
      alias: Tester
      resource:
        id: TestLib
        source: TestLib.js
  resources:
    - id: Image1
      source: poster.png
    - id: Image2
      source: https://www.w3schools.com/html/pic_trulli.jpg
      isExternal: true
    - id: Audio1
      source: viper.mp3
    - id: Audio2
      source: https://www.w3schools.com/html/horse.mp3
      isExternal: true
    - id: Video1
      source:  rabbit320.mp4
    - id: Video2
      source: https://www.w3schools.com/html/mov_bbb.mp4
      isExternal: true

fields:
  - id: Info1
    name: Infofeld
    explanation: Infofeld für Erläuterungen durch Texte
    type: INFO
    hidden: true
    text: Infotext
  - id: Image1
    name: Infofeld
    explanation: Infofeld für Erläuterungen durch Bilder
    type: INFO
    hidden: true
    text: Image nicht gefunden
    contentType: IMAGE
    maxWidth: 512
    maxHeight: 512
    resourceID: Image1
  - id: Audio1
    name: Infofeld
    explanation: Infofeld für Erläuterungen durch Audios
    type: INFO
    hidden: true
    text: Audio nicht gefunden
    contentType: AUDIO
    maxWidth: 512
    maxHeight: 512
    resourceID: Audio1
  - id: Video1
    name: Infofeld
    explanation: Infofeld für Erläuterungen durch Videos
    type: INFO
    hidden: true
    text: Video nicht gefunden
    contentType: VIDEO
    maxWidth: 512
    maxHeight: 512
    resourceID: Video1
  - id: Text1
    name: Einfaches Feld
    explanation: Eingabe und Verarbeitung als genau ein Wert
    allowEmpty: true
    type: TEXT
    hidden: true
    multiline: true
    minLines: 3
    maxLines: 12
  - id: Split1
    name: Aufgeteiltes Feld
    explanation: "Eingabe als genau ein Wert, Verarbeitung als Liste (aufgeteilt nach zu konfigurierendem Trennzeichen, hier: ';')"
    allowEmpty: true
    type: SPLIT
    hidden: true
    separator: ";"
    multiline: true
    minLines: 3
    maxLines: 12
  - id: Radio1
    name: Ankreuzfeld
    explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als einzelner Wert
    allowEmpty: true
    type: CHECK
    hidden: true
    multipleCheck: false
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: Check1
    name: Ankreuzfeld
    explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als Liste von Werten
    allowEmpty: true
    type: CHECK
    hidden: true
    multipleCheck: true
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: Select1
    name: Auswahlfeld
    explanation: Eingabe durch Auswahl aus vorgegebenen Werten, Verarbeitung als ein Wert
    allowEmpty: true
    type: SELECT
    hidden: true
    emptyOption: true
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: List1
    name: Listenfeld
    explanation: Eingabe und Verarbeitung als Liste von Werten dynamischer Anzahl
    allowEmpty: true
    type: LIST
    hidden: true
    growthDirection: HORIZONTAL
    allowWrap: true
    initialEntries: 3
    minEntryWidth: 5
    maxEntries: 20
  - id: Table1
    name: Tabellenfeld
    allowEmpty: true
    type: TABLE
    hidden: true
    growthDirection: VERTICAL
    initialEntries: 3
    maxEntries: 20
    innerFields:
      - id: Attr1
        type: TEXT
      - id: Attr2
        type: TEXT
      - id: Attr3
        type: TEXT

states:
  - id: Z0
    name: Lernmodul initialisiert
    explanation: Einstieg
    type: ENTRY
    transitions:
      - target: Z1a
  - id: Z1a
    name: Test von Info1
    actions:
      - Info1.setDisplayed(true)
      - Module.print(Info1.getDebug())
      - errors.value = errors.value.concat(Tester.testInfoField(Info1))
    transitions:
      - target: Z1b
  - id: Z1b
    name: Test von Info1 aufräumen
    importance: ZERO
    actions:
      - Info1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z2a
  - id: Z2a
    name: Test von Image1
    actions:
      - Image1.setDisplayed(true)
      - Module.print(Image1.getDebug())
      - errors.value = errors.value.concat(Tester.testImageField(Image1))
    transitions:
      - target: Z2b
  - id: Z2b
    name: Test von Image1 aufräumen
    importance: ZERO
    actions:
      - Image1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z3a
  - id: Z3a
    name: Test von Audio1
    actions:
      - Audio1.setDisplayed(true)
      - Module.print(Audio1.getDebug())
      - errors.value = errors.value.concat(Tester.testAudioField(Audio1))
    transitions:
      - target: Z3b
  - id: Z3b
    name: Test von Audio1 aufräumen
    importance: ZERO
    actions:
      - Audio1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z4a
  - id: Z4a
    name: Test von Video1
    actions:
      - Video1.setDisplayed(true)
      - Module.print(Video1.getDebug())
      - errors.value = errors.value.concat(Tester.testVideoField(Video1))
    transitions:
      - target: Z4b
  - id: Z4b
    name: Test von Video1 aufräumen
    importance: ZERO
    actions:
      - Video1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z5a
  - id: Z5a
    name: Test von Text1
    actions:
      - Text1.setDisplayed(true)
      - Module.print(Text1.getDebug())
      - errors.value = errors.value.concat(Tester.testTextField(Text1))
      - Text1.setEnabled(false);
    transitions:
      - target: Z5b
  - id: Z5b
    name: Test von Text1 aufräumen
    importance: ZERO
    actions:
      - Text1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z6a
  - id: Z6a
    name: Test von Split1
    actions:
      - Split1.setDisplayed(true)
      - Module.print(Split1.getDebug())
      - errors.value = errors.value.concat(Tester.testSplitField(Split1))
      - Split1.setEnabled(false)
    transitions:
      - target: Z6b
  - id: Z6b
    name: Test von Split1 aufräumen
    importance: ZERO
    actions:
      - Split1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z7a
  - id: Z7a
    name: Test von Radio1
    actions:
      - Radio1.setDisplayed(true)
      - Module.print(Radio1.getDebug())
      - errors.value = errors.value.concat(Tester.testRadioField(Radio1))
      - Radio1.setEnabled(false)
    transitions:
      - target: Z7b
  - id: Z7b
    name: Test von Radio1 aufräumen
    importance: ZERO
    actions:
      - Radio1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z8a
  - id: Z8a
    name: Test von Check1
    actions:
      - Check1.setDisplayed(true)
      - Module.print(Check1.getDebug())
      - errors.value = errors.value.concat(Tester.testCheckField(Check1))
      - Check1.setEnabled(false)
    transitions:
      - target: Z8b
  - id: Z8b
    name: Test von Check1 aufräumen
    importance: ZERO
    actions:
      - Check1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z9a
  - id: Z9a
    name: Test von Select1
    actions:
      - Select1.setDisplayed(true)
      - Module.print(Select1.getDebug())
      - errors.value = errors.value.concat(Tester.testSelectField(Select1))
      - Select1.setEnabled(false)
    transitions:
      - target: Z9b
  - id: Z9b
    name: Test von Select1 aufräumen
    importance: ZERO
    actions:
      - Select1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z10a
  - id: Z10a
    name: Test von List1
    actions:
      - List1.setDisplayed(true)
      - Module.print(List1.getDebug())
      - errors.value = errors.value.concat(Tester.testListField(List1))
      - List1.setEnabled(false)
    transitions:
      - target: Z10b
  - id: Z10b
    name: Test von List1 aufräumen
    importance: ZERO
    actions:
      - List1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z11a
  - id: Z11a
    name: Test von Table1
    actions:
      - Table1.setDisplayed(true)
      - Module.print(Table1.getDebug())
      - errors.value = errors.value.concat(Tester.testTableField(Table1))
      - Table1.setEnabled(false)
    transitions:
      - target: Z11b
  - id: Z11b
    name: Test von Table1 aufräumen
    importance: ZERO
    actions:
      - Table1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z12a
      - target: Z12b
        conditions:
          - terms:
              - errors.value.getLength() === 0
  - id: Z12a
    name: Fehler aufgetreten
    actions:
      - "Module.alert('Es sind Fehler aufgetreten:\\n' + errors.value.map(err => err.message).join('\\n'))"
  - id: Z12b
    name: Alle Tests erfolgreich
    actions:
      - "Module.alert('Alle Tests erfolgreich')"