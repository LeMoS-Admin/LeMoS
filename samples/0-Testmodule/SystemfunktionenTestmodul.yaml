# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: Modul zum Testen aller Systemfunktionen
  explanation: |
    Lernmodul, dass alle möglichen Systemfunktionen mindestens einmal ausführt und das Ergebnis vergleicht
  settings:
    libraryVersion: 1.0.0
    showFieldIDs: true
    differentStepSizes: false
  logger:
    minWidth: 200
    minHeight: 20
  variables:
    - name: errors
      value: "[]"
  imports:
    - name: TestLib
      alias: Tester
      resource:
        id: TestLib
        source: ./resources/TestLib.js
  resources:
    - id: Image1
      source: ./resources/img0_3840x2160.jpg
    - id: Image2
      source: https://www.w3schools.com/html/pic_trulli.jpg
      isExternal: true
    - id: Audio1
      source: ./resources/viper.mp3
    - id: Audio2
      source: https://www.w3schools.com/html/horse.mp3
      isExternal: true
    - id: Video1
      source:  ./resources/rabbit320.mp4
    - id: Video2
      source: https://www.w3schools.com/html/mov_bbb.mp4
      isExternal: true

fields:
  - id: Info1
    name: Infofeld
    type: INFO
    hidden: true
    text: Infotext
  - id: Image1
    name: Infofeld
    explanation: Image, das lokal im Lernmodul abgelegt ist
    type: INFO
    hidden: true
    text: Image nicht gefunden
    contentType: IMAGE
    maxWidth: 512
    maxHeight: 512
    resourceID: Image1
  - id: Audio1
    name: Infofeld
    explanation: Audio, die lokal im Lernmodul abgelegt ist
    type: INFO
    hidden: true
    text: Audio nicht gefunden
    contentType: AUDIO
    maxWidth: 512
    maxHeight: 512
    resourceID: Audio1
  - id: Video1
    name: Infofeld
    explanation: Video, das von einer externen Quelle geladen wird
    type: INFO
    hidden: true
    text: Video nicht gefunden
    contentType: VIDEO
    maxWidth: 512
    maxHeight: 512
    resourceID: Video1
  - id: Text1
    name: Einfaches Feld
    explanation: Eingabe und Verarbeitung als genau ein Wert
    allowEmpty: true
    type: TEXT
    hidden: true
    multiline: true
    minLines: 3
    maxLines: 12
  - id: Split1
    name: Aufgeteiltes Feld
    explanation: "Eingabe als genau ein Wert, Verarbeitung als Liste (aufgeteilt nach zu konfigurierendem Trennzeichen, hier: ';')"
    allowEmpty: true
    type: SPLIT
    hidden: true
    separator: ";"
    multiline: true
    minLines: 3
    maxLines: 12
  - id: Radio1
    name: Ankreuzfeld
    explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als einzelner Wert
    allowEmpty: true
    type: CHECK
    hidden: true
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: Check1
    name: Ankreuzfeld
    explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als Liste von Werten
    allowEmpty: true
    type: CHECK
    hidden: true
    multipleCheck: true
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: Selector1
    name: Auswahlfeld
    explanation: Eingabe durch Auswahl aus vorgegebenen Werten, Verarbeitung als ein Wert
    allowEmpty: true
    type: SELECTOR
    hidden: true
    emptyOption: true
    options:
      - id: Opt0
        name: Option 0
        explanation: Nullte Option
      - id: Opt1
        name: Option 1
        explanation: Erste Option
      - id: Opt2
        name: Option 2
        explanation: Zweite Option
  - id: List1
    name: Listenfeld
    explanation: Eingabe und Verarbeitung als Liste von Werten dynamischer Anzahl
    allowEmpty: true
    type: LIST
    hidden: true
    growthDirection: HORIZONTAL
    allowWrap: true
    initialEntries: 5
    minEntryWidth: 5
    maxEntries: 20
  - id: Table1
    name: Tabellenfeld
    explanation: Eingabe und Verarbeitung als Liste von Werten dynamischer Anzahl
    allowEmpty: true
    type: TABLE
    hidden: true
    initialEntries: 5
    maxEntries: 20
    innerFields:
      - id: Info1
        name: Infofeld (Text)
        type: INFO
        text: Statische Anzeige eines Texts ohne weitere Verarbeitung
      - id: Image1
        name: Infofeld (Image, lokal)
        explanation: Image, das lokal im Lernmodul abgelegt ist
        type: INFO
        text: Image nicht gefunden
        contentType: IMAGE
        maxWidth: 512
        maxHeight: 512
        resourceID: Image1
      - id: Audio1
        name: Infofeld (Audio, lokal)
        explanation: Audio, die lokal im Lernmodul abgelegt ist
        type: INFO
        text: Audio nicht gefunden
        contentType: AUDIO
        maxWidth: 512
        maxHeight: 512
        resourceID: Audio1
      - id: Video1
        name: Infofeld (Video, lokal)
        explanation: Video, das von einer externen Quelle geladen wird
        type: INFO
        text: Video nicht gefunden
        contentType: VIDEO
        maxWidth: 512
        maxHeight: 512
        resourceID: Video1
      - id: Text1
        name: Einfaches Feld
        explanation: Eingabe und Verarbeitung als genau ein Wert
        allowEmpty: true
        type: TEXT
        multiline: true
        minLines: 3
        maxLines: 12
      - id: Split1
        name: Aufgeteiltes Feld
        explanation: "Eingabe als genau ein Wert, Verarbeitung als Liste (aufgeteilt nach zu konfigurierendem Trennzeichen, hier: ';')"
        allowEmpty: true
        type: SPLIT
        separator: ";"
        multiline: true
        minLines: 3
        maxLines: 12
      - id: Radio1
        name: Ankreuzfeld
        explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als einzelner Wert
        allowEmpty: true
        type: CHECK
        options:
          - id: Opt0
            name: Option 0
            explanation: Nullte Option
          - id: Opt1
            name: Option 1
            explanation: Erste Option
          - id: Opt2
            name: Option 2
            explanation: Zweite Option
      - id: Check1
        name: Ankreuzfeld
        explanation: Eingabe durch Anhaken aus vorgegebenen Werten, Verarbeitung als Liste von Werten
        allowEmpty: true
        type: CHECK
        multipleCheck: true
        options:
          - id: Opt0
            name: Option 0
            explanation: Nullte Option
          - id: Opt1
            name: Option 1
            explanation: Erste Option
          - id: Opt2
            name: Option 2
            explanation: Zweite Option
      - id: Selector1
        name: Auswahlfeld
        explanation: Eingabe durch Auswahl aus vorgegebenen Werten, Verarbeitung als ein Wert
        allowEmpty: true
        type: SELECTOR
        emptyOption: true
        options:
          - id: Opt0
            name: Option 0
            explanation: Nullte Option
          - id: Opt1
            name: Option 1
            explanation: Erste Option
          - id: Opt2
            name: Option 2
            explanation: Zweite Option
      - id: List1
        name: Listenfeld
        explanation: Eingabe und Verarbeitung als Liste von Werten dynamischer Anzahl
        allowEmpty: true
        type: LIST
        growthDirection: HORIZONTAL
        allowWrap: true
        initialEntries: 5
        minEntryWidth: 5
        maxEntries: 20
      - id: Table1
        name: Tabellenfeld
        allowEmpty: true
        type: TABLE
        innerFields:
          - id: Attr1
            type: TEXT
          - id: Attr2
            type: TEXT
          - id: Attr3
            type: TEXT
        growthDirection: VERTICAL
        minColumnWidth: 2
        initialEntries: 3
        maxEntries: 5

states:
  - id: Z0
    name: Lernmodul initialisiert
    explanation: Einstieg
    type: ENTRY
    actions:
      - Tester.setSystemLibs(Module, Resource, Utils)
    transitions:
      - target: Z1a
  - id: Z1a
    name: Test von Info1
    actions:
      - Info1.setDisplayed(true)
      - Module.print(Info1.toDebugString())
      - errors.value.add(Tester.testInfoField(Info1))
    transitions:
      - target: Z1b
  - id: Z1b
    name: Test von Info1 aufräumen
    importance: ZERO
    actions:
      - Info1.setDisplayed(false)
      - Module.clearLogger()
    transitions:
      - target: Z2a
  - id: Z2a
    name: Test von Image1
    actions:
      - Image1.setDisplayed(true)
      - Module.print(Image1.toDebugString())
      - errors.value.add(Tester.testImageField(Image1))
