states:
  - id: Z0
    name: Lernmodul initialisiert
    explanation: Einstieg
    type: ENTRY
    actions:
      - "Module.print('Willkommen beim Lernmodul zum Vergleich der Boxmodelle.')"
      - "Module.print('Bitte konfiguriere folgende Werte oder lade ein Szenario:')"
      - "Module.print('- Aufgabentyp')"
      - "Module.print('- Breite (abhängig vom Aufgabentyp)')"
      - "Module.print('- Höhe (abhängig vom Aufgabentyp)')"
      - "Module.print('- Außenabstände (alle Seiten)')"
      - "Module.print('- Rahmendicken (alle Seiten)')"
      - "Module.print('- Innenabstände (alle Seiten)')"
    transitions:
      - target: Z1
  - id: Z1
    name: Aufgabentyp?
    type: JUNCTION
    transitions:
      - target: Z1a
        conditions:
          - terms:
              - Typ.equals("Einstellwerte")
      - target: Z1b
        conditions:
          - terms:
              - Typ.equals("Inhaltswerte")
      - target: Z1c
        conditions:
          - terms:
              - Typ.equals("Boxwerte")

# Aufgabentyp 'Einstellwerte'
  - id: Z1a
    name: Aufgabentyp 'Einstellwerte' – Einstellgrößen übernommen
    actions:
      - "Module.print('Die Einstellgrößen sind gegeben und werden daher lediglich übernommen.')"
      - CBox_EB.value = B
      - CBox_EH.value = H
      - BBox_EB.value = B
      - BBox_EH.value = H
      - "Module.print('')"
    transitions:
      - target: Z2a
  - id: Z2a
    name: Aufgabentyp 'Einstellwerte' – Inhaltsgrößen berechnet
    actions:
      - "Module.print('Die Inhaltsgrößen für Content-Boxen berechnen sich wie folgt:')"
      - "Module.print('Inhaltsbreite = Einstellbreite - Linke Rahmendicke - Linker Innenabstand - Inhaltsbreite - Rechte Rahmendicke - Rechter Innenabstand')"
      - "Module.print(`Inhaltsbreite = ${CBox_EB} - ${BL} - ${PL} - ${PR} - ${BR}`)"
      - CBox_IB.value = CBox_EB - BL - PL - PR - BR
      - "Module.print('Inhaltshöhe = Einstellhöhe - Obere Rahmendicke - Oberer Innenabstand - Inhaltshöhe - Untere Rahmendicke - Unterer Innenabstand')"
      - "Module.print(`Inhaltshöhe = ${CBox_EH} - ${BT} - ${PT} - ${PB} - ${BB}`)"
      - CBox_IH.value = CBox_EH - BT - PT - PB - BB
      - "Module.print('Die Inhaltsgrößen für Border-Boxen entsprechen den Einstellgrößen und werden daher lediglich übernommen.')"
      - BBox_IB.value = BBox_EB.value
      - BBox_IH.value = BBox_EH.value
      - "Module.print('')"
    transitions:
      - target: Z3a
  - id: Z3a
    name: Aufgabentyp 'Einstellwerte' – Boxgrößen berechnet
    actions:
      - "Module.print('Die Boxgrößen für Content-Boxen entsprechen den Einstellgrößen und werden daher lediglich übernommen.')"
      - CBox_BB.value = BBox_EB.value
      - CBox_BH.value = BBox_EH.value
      - "Module.print('Die Boxgrößen für Border-Boxen berechnen sich wie folgt:')"
      - "Module.print('Boxbreite = Linke Rahmendicke + Linker Innenabstand + Einstellbreite + Rechte Rahmendicke + Rechter Innenabstand')"
      - "Module.print(`Boxbreite = ${BL} + ${PL} + ${CBox_EB} + ${PR} + ${BR}`)"
      - BBox_BB.value = BL + PL + CBox_EB + PR + BR
      - "Module.print('Boxhöhe = Obere Rahmendicke + Oberer Innenabstand + Einstellhöhe + Untere Rahmendicke + Unterer Innenabstand')"
      - "Module.print(`Boxhöhe = ${BT} + ${PT} + ${CBox_EH} + ${PB} + ${BB}`)"
      - BBox_BH.value = BT + PT + CBox_EH + PB + BB
      - "Module.print('')"
    transitions:
      - target: Z4

# Aufgabentyp 'Inhaltswerte'
  - id: Z1b
    name: Aufgabentyp 'Inhaltswerte' – Inhaltsgrößen übernommen
    actions:
      - "Module.print('Die Inhaltsgrößen sind gegeben und werden daher lediglich übernommen.')"
      - CBox_IB.value = B
      - CBox_IH.value = H
      - BBox_IB.value = B
      - BBox_IH.value = H
      - "Module.print('')"
    transitions:
      - target: Z2b
  - id: Z2b
    name: Aufgabentyp 'Inhaltswerte' – Einstellgrößen berechnet
    actions:
      - "Module.print('Die Einstellgrößen für Content-Boxen berechnen sich wie folgt:')"
      - "Module.print('Einstellbreite = Linke Rahmendicke + Linker Innenabstand + Inhaltsbreite + Rechte Rahmendicke + Rechter Innenabstand')"
      - "Module.print(`Einstellbreite = ${BL} + ${PL} + ${CBox_IB} + ${PR} + ${BR}`)"
      - CBox_EB.value = BL + PL + CBox_IB + PR + BR
      - "Module.print('Einstellhöhe = Obere Rahmendicke + Oberer Innenabstand + Inhaltshöhe + Untere Rahmendicke + Unterer Innenabstand')"
      - "Module.print(`Einstellhöhe = ${BT} + ${PT} + ${CBox_IH} + ${PB} + ${BB}`)"
      - CBox_EH.value = BT + PT + CBox_IH + PB + BB
      - "Module.print('Die Einstellgrößen für Border-Boxen entsprechen den Inhaltsgrößen und werden daher lediglich übernommen.')"
      - BBox_EB.value = BBox_IB.value
      - BBox_EH.value = BBox_IH.value
      - "Module.print('')"
    transitions:
      - target: Z3b
  - id: Z3b
    name: Aufgabentyp 'Inhaltswerte' – Boxgrößen berechnet
    actions:
      - "Module.print('Die Boxgrößen berechnen sich wie folgt:')"
      - "Module.print('Boxbreite = Linke Rahmendicke + Linker Innenabstand + Inhaltsbreite + Rechte Rahmendicke + Rechter Innenabstand')"
      - "Module.print(`Boxbreite (Content-Box) = ${BL} + ${PL} + ${CBox_IB} + ${PR} + ${BR}`)"
      - "Module.print(`Boxbreite (Border-Box) = ${BL} + ${PL} + ${BBox_IB} + ${PR} + ${BR}`)"
      - CBox_BB.value = BL + PL + CBox_IB + PR + BR
      - BBox_BB.value = BL + PL + BBox_IB + PR + BR
      - "Module.print('Boxhöhe = Obere Rahmendicke + Oberer Innenabstand + Inhaltshöhe + Untere Rahmendicke + Unterer Innenabstand')"
      - "Module.print(`Boxhöhe (Content-Box) = ${BT} + ${PT} + ${CBox_IH} + ${PB} + ${BB}`)"
      - "Module.print(`Boxhöhe (Border-Box) = ${BT} + ${PT} + ${BBox_IH} + ${PB} + ${BB}`)"
      - CBox_BH.value = BT + PT + CBox_IH + PB + BB
      - BBox_BH.value = BT + PT + BBox_IH + PB + BB
      - "Module.print('')"
    transitions:
      - target: Z4

  # Aufgabentyp 'Boxwerte'
  - id: Z1c
    name: Aufgabentyp 'Boxwerte' – Boxgrößen übernommen
    actions:
      - "Module.print('Die Boxgrößen sind gegeben und werden daher lediglich übernommen.')"
      - CBox_BB.value = B
      - CBox_BH.value = H
      - BBox_BB.value = B
      - BBox_BH.value = H
      - "Module.print('')"
    transitions:
      - target: Z2c
  - id: Z2c
    name: Aufgabentyp 'Boxwerte' – Einstellgrößen berechnet
    actions:
      - "Module.print('Die Einstellgrößen für Content-Boxen entsprechen den Boxgrößen und werden daher lediglich übernommen.')"
      - CBox_EB.value = CBox_BB.value
      - CBox_EH.value = CBox_BH.value
      - "Module.print('Die Einstellgrößen für Border-Boxen berechnen sich wie folgt:')"
      - "Module.print('Einstellbreite = Boxbreite - Linke Rahmendicke - Linker Innenabstand - Rechte Rahmendicke - Rechter Innenabstand')"
      - "Module.print(`Einstellbreite = ${BBox_BB} - ${BL} - ${PL} - ${PR} - ${BR}`)"
      - BBox_EB.value = BBox_BB - BL - PL - PR - BR
      - "Module.print('Einstellhöhe = Boxhöhe - Obere Rahmendicke - Oberer Innenabstand - Untere Rahmendicke - Unterer Innenabstand')"
      - "Module.print(`Einstellhöhe = ${BBox_BH} - ${BT} - ${PT} - ${PB} - ${BB}`)"
      - BBox_EH.value = BBox_BH - BT - PT - PB - BB
      - "Module.print('')"
    transitions:
      - target: Z3c
  - id: Z3c
    name: Aufgabentyp 'Boxwerte' – Inhaltsgrößen berechnet
    actions:
      - "Module.print('Die Inhaltsgrößen berechnen sich wie folgt:')"
      - "Module.print('Einstellbreite = Boxbreite - Linke Rahmendicke - Linker Innenabstand - Rechte Rahmendicke - Rechter Innenabstand')"
      - "Module.print(`Einstellbreite = ${CBox_BB} - ${BL} - ${PL} - ${PR} - ${BR}`)"
      - "Module.print(`Einstellbreite = ${BBox_BB} - ${BL} - ${PL} - ${PR} - ${BR}`)"
      - CBox_IB.value = CBox_BB - BL - PL - PR - BR
      - BBox_IB.value = BBox_BB - BL - PL - PR - BR
      - "Module.print('Einstellhöhe = Boxhöhe - Obere Rahmendicke - Oberer Innenabstand - Untere Rahmendicke - Unterer Innenabstand')"
      - "Module.print(`Einstellhöhe = ${CBox_BH} - ${BT} - ${PT} - ${PB} - ${BB}`)"
      - "Module.print(`Einstellhöhe = ${BBox_BH} - ${BT} - ${PT} - ${PB} - ${BB}`)"
      - CBox_IH.value = CBox_BH - BT - PT - PB - BB
      - BBox_IH.value = BBox_BH - BT - PT - PB - BB
      - "Module.print('')"
    transitions:
      - target: Z4

# Weitere Schritte
  - id: Z4
    name: Gesamtgröße berechnet
    actions:
      - "Module.print('Die Gesamtgröße der Boxen berechnet sich wie folgt:')"
      - "Module.print('Gesamtbreite = Linker Außenabstand + Boxbreite + Rechter Außenabstand')"
      - "Module.print(`Gesamtbreite (Content-Box) = ${ML} + ${CBox_BB} + ${MR}`)"
      - "Module.print(`Gesamtbreite (Border-Box) = ${ML} + ${BBox_BB} + ${MR}`)"
