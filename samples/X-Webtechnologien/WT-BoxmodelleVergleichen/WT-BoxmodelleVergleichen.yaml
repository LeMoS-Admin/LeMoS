# yaml-language-server: $schema=../../LeMoS-Modul-Schema.json
general:
  heading: Boxmodelle vergleichen
  explanation: |
    Alle Elemente einer Webseite haben eine Box, die unter anderem ihre Umrandung und den Abstand zu anderen Boxen definiert.<br>
    Konkret besteht jede Box neben dem Inhalt aus drei Schichten, von innen nach außen lauten diese 'padding' (Innenabstand), 'border' (Rahmendicke), 'margin' (Außenabstand).<br>
    <br>
    Der Außenabstand jedoch kein fester Teil der Box, er ist eher wie ein minimaler Abstand zu anderen Boxen zu verstehen.<br>
    Bei zwei nebeneinander liegenden Boxen werden die Außenabstände daher nicht addiert, sondern lediglich der größere Wert als Abstand eingehalten.<br>
    <br>
    Für die Auswirkung der beiden anderen Schichten gibt es hingegen zwei verschiedene Modelle: 'content-box' und 'border-box'.<br>
    Die 'content-box' ist das Standardverhalten und berechnet die tatsächliche Größe der Box wie folgt: <br>
    &nbsp;&nbsp; Boxgröße = Eingestellte Größe + Innenabstand + Rahmendicke, für die Größe des eigentlichen Inhalts gilt somit: Inhalt = Eingestellte Größe<br>
    Bei dem alternativen Modell 'border-box' inkludiert die angegebene Größe der Box den Innenabstand und die Rahmendicke, somit gilt: <br>
    &nbsp;&nbsp; Boxgröße = Eingestellte Größe, die Größe des eigentlichen Inhalts berechnet sich somit wie folgt: Inhalt = Eingestellte Größe - Innenabstand - Rahmendicke<br>
    <br>
    Um diese Unterschiede greifbarer zu machen, ermöglicht dieses Lernmodul den interaktiven Vergleich der beiden Modelle.
  sources:
    - Webtechnologien-Skript zu CSS
    - <a href='https://developer.mozilla.org/de/docs/Learn_web_development/Core/Styling_basics/Box_model' target="_blank">Online-Dokumentation</a>
  contacts:
    - name: Professor Dr. Dieter Wißmann
      purpose: Fachliche Fragen
      data:
        Telefon: 09561 317-152
        E-Mail: dieter.wissmann@hs-coburg.de
        Büro: 2-127
    - name: Professor Dr. Dieter Wißmann
      purpose: Technische Fragen
      data:
        Telefon: 09561 317-152
        E-Mail: dieter.wissmann@hs-coburg.de
        Büro: 2-127
  settings:
    lemosVersion: 1.0.0
    differentStepSizes: false
  logger:
    minWidth: 120
      
fields:
  - id: Typ
    name: Aufgabentyp
    explanation: |
      Für den Vergleich der Box-Modelle gibt es zwei Herangehensweisen: <br>
      - Eingestellte Größe ist gegeben: die eingestellten Abmessungen der Boxen sind gegeben, somit sind die resultierenden Inhalts- und Boxgrößen zu berechnen. <br>
      - Größe des Inhalts ist gegeben: die Soll-Größe des Inhalts ist gegeben, somit sind die dafür einzustellenden Abmessungen sowie die resultierenden Boxgrößen zu berechnen. <br>
      - Größe der Boxen ist gegeben: die Soll-Größe der Box ist gegeben, somit sind die dafür einzustellenden Abmessungen sowie die resultierenden Inhaltsgrößen zu berechnen.
    type: SELECT
    options:
      - id: Einstellwerte
        name: Eingestellte Größe (Einstellgröße) ist gegeben
      - id: Inhaltswerte
        name: Größe des Inhalts (Inhaltsgröße) ist gegeben
      - id: Boxwerte
        name: Größe der Boxen (Boxgröße) ist gegeben
    style:
      row: 1
      column: 1
      width: 4
  - id: B
    name: Breite
    explanation: |
      Bei Aufgabentyp 'Eingestellte Größe ist gegeben': über width-Attribut eingestellte Breite der Boxen (in Pixeln)
      Bei Aufgabentyp 'Größe des Inhalts ist gegeben': Soll-Breite des Inhalts (in Pixeln)
      Bei Aufgabentyp 'Größe der Boxen ist gegeben': Soll-Breite der Boxen (in Pixeln)
    type: TEXT
    datatype: INTEGER
    style:
      row: 2
      column: 1
      width: 2
  - id: H
    name: Höhe
    explanation: |
      Bei Aufgabentyp 'Eingestellte Größe ist gegeben': über height-Attribut eingestellte Höhe der Boxen (in Pixeln)
      Bei Aufgabentyp 'Größe des Inhalts ist gegeben': Soll-Höhe des Inhalts (in Pixeln)
      Bei Aufgabentyp 'Größe der Boxen ist gegeben': Soll-Höhe der Boxen (in Pixeln)
    type: TEXT
    datatype: INTEGER
    style:
      row: 2
      column: 3
      width: 2
  - id: Beispiel
    name: "Beispiel aus der Mozilla-Dokumentation:"
    type: INFO
    contentType: IMAGE
    maxHeight: 180
    resource:
      id: BoxModell
      source: box-model.png
    style:
      row: 1
      column: 10
      height: 3
      width: 5
  - id: MT
    name: Oberer Außenabstand
    explanation: "CSS-Attribut: margin-top"
    type: TEXT
    datatype: INTEGER
    style:
      row: 1
      column: 7
      width: 2
  - id: BT
    name: Obere Rahmendicke
    explanation: "CSS-Attribut: border-top"
    type: TEXT
    datatype: INTEGER
    style:
      row: 2
      column: 7
      width: 2
  - id: PT
    name: Oberer Innenabstand
    explanation: "CSS-Attribut: padding-top"
    type: TEXT
    datatype: INTEGER
    style:
      row: 3
      column: 7
      width: 2
  - id: ML
    name: Linker Außenabstand
    explanation: "CSS-Attribut: margin-left"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 1
      width: 2
  - id: BL
    name: Linke Rahmendicke
    explanation: "CSS-Attribut: border-left"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 3
      width: 2
  - id: PL
    name: Linker Innenabstand
    explanation: "CSS-Attribut: padding-left"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 5
      width: 2
  - id: MR
    name: Rechter Außenabstand
    explanation: "CSS-Attribut: margin-right"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 13
      width: 2
  - id: BR
    name: Rechte Rahmendicke
    explanation: "CSS-Attribut: border-right"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 11
      width: 2
  - id: PR
    name: Rechter Innenabstand
    explanation: "CSS-Attribut: padding-right"
    type: TEXT
    datatype: INTEGER
    style:
      row: 4
      column: 9
      width: 2
  - id: MB
    name: Unterer Außenabstand
    explanation: "CSS-Attribut: margin-bottom"
    type: TEXT
    datatype: INTEGER
    style:
      row: 7
      column: 7
      width: 2
  - id: BB
    name: Untere Rahmendicke
    explanation: "CSS-Attribut: border-bottom"
    type: TEXT
    datatype: INTEGER
    style:
      row: 6
      column: 7
      width: 2
  - id: PB
    name: Unterer Innenabstand
    explanation: "CSS-Attribut: padding-bottom"
    type: TEXT
    datatype: INTEGER
    style:
      row: 5
      column: 7
      width: 2
  - id: CBox
    name: Content-Box
    explanation: "Hinweis: bei Content-Boxen entspricht die Einstellbreite stets der Boxbreite."
    type: INFO
    style:
      row: 8
      column: 1
      width: 6
  - id: CBox_EB
    name: Einstellbreite
    explanation: Breite, die über das width-Attribut eingestellt ist
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
      row: 9
      column: 1
      width: 3
  - id: CBox_EH
    name: Einstellhöhe
    explanation: Höhe, die über das height-Attribut eingestellt ist
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
      row: 9
      column: 4
      width: 3
  - id: CBox_IB
    name: Inhaltsbreite
    explanation: Breite, die dem Inhalt der Box tatsächlich zur Verfügung steht
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
      row: 10
      column: 1
      width: 3
  - id: CBox_IH
    name: Inhaltshöhe
    explanation: Höhe, die dem Inhalt der Box tatsächlich zur Verfügung steht
    type: TEXT
