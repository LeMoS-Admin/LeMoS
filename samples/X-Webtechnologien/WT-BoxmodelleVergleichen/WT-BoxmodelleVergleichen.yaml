    usage: OUTPUT
    style:
      row: 12
      column: 1
      width: 3
  - id: CBox_GH
    name: Gesamthöhe
    explanation: Höhe, die die Box auf der Webseite mindestens benötigt (das heißt inklusive Außenabständen)
    type: TEXT
