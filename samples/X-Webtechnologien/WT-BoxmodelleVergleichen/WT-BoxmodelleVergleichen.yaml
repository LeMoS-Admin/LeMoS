    explanation: "Hinweis: bei Border-Boxen entspricht die Einstellbreite stets der Inhaltsbreite."
    style:
      row: 8
      column: 9
      width: 6
  - id: BBox_EB
    name: Einstellbreite
    explanation: Breite, die über das width-Attribut eingestellt ist
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
