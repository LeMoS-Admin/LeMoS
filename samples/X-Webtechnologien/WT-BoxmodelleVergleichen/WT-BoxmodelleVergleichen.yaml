    style:
      row: 9
      column: 12
      width: 3
  - id: BBox_IB
    name: Inhaltsbreite
    explanation: Breite, die dem Inhalt der Box tatsächlich zur Verfügung steht
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
      row: 10
      column: 9
      width: 3
  - id: BBox_IH
    name: Inhaltshöhe
    explanation: Höhe, die dem Inhalt der Box tatsächlich zur Verfügung steht
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
      row: 10
      column: 12
      width: 3
  - id: BBox_BB
    name: Boxbreite
    explanation: Breite, die die eigentliche Box (das heißt exklusive Außenabständen) hat
    type: TEXT
    datatype: INTEGER
    usage: OUTPUT
    style:
