# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: Freispeicherverwaltung L2
  explanation: |
    Arbeitsspeicher verschiedener Prozesse mittels Bitmap verwalten (Verfahren: First Fit)<br>
    --> Speicherabschnitte können für Prozesse allokiert und freigegeben werden<br>
    L2 = Allokation und Freigabe als Zustände ausmodelliert
  settings:
    lemosVersion: 2.0.0
  variables:
    - name: X
  functions:
    - name: prozessAllokiert
      implementation:
        - return S.getAttribute("P").includes(X.value.get("P"))
    - name: speicherVerfügbar
      implementation:
        - |
          S.restartIterator();
          while(S.hasNext()) {
            let index0 = S.findNextByAttribute("Z", 0);
            if(index0 === undefined)
              return false;
            else
              index0 = index0.get("N");
          
            let index1 = S.findNextByAttribute("Z", 1);
            if(index1 === undefined)
              index1 = S.getLength();
            else
              index1 = index1.get("N");
          
            let length = index1 - index0;
            if(length >= X.value.get("G"))
              return true;
            else
              continue;
          }
          return false;
    - name: findeProzessStart
      implementation:
        - return S.findByAttribute("P", X.value.get("P")).get("N")
    - name: findeProzessEnde
      implementation:
        - return S.findLastByAttribute("P", X.value.get("P")).get("N") + 1
    - name: findeZustand
      parameters:
        - Zustand
      implementation:
        - let speicherEintrag = S.findNextByAttribute("Z", Zustand)
        - if(speicherEintrag !== undefined) return speicherEintrag.get("N")
        - else return S.getLength()
    - name: speicherSetzen
      parameters:
        - Prozess
        - Zustand
      implementation:
        - S.withEmptyEntries().fillAttribute("Z", Prozess, V.asNumber(), B.asNumber())
        - S.withEmptyEntries().fillAttribute("P", Zustand, V.asNumber(), B.asNumber())


fields:
  - id: E
    name: Ereignistabelle
    explanation: Liste der durchzuführenden Allokationen und Freigaben
    type: TABLE
    allowEmpty: true
    restrictions:
      - errorMessage: Bei der Allokation von Speicher ist die zu allokierende Größe anzugeben, bei der Freigabe ist keine Größe anzugeben
        terms:
          - |
            ((entry.get('A').getValue() === 'Allokation') && !entry.get('G').isEmpty()) ||
            ((entry.get('A').getValue() === 'Freigabe') && entry.get('G').isEmpty())
    initialEntries: 1
    innerFields:
      - id: A
        name: Aktion
        type: SELECT
        emptyOption: true
        options:
          - id: Leer
            name: Bitte wählen
          - id: Allokation
          - id: Freigabe
      - id: P
        name: Prozess
        type: TEXT
        datatype: INTEGER
        restrictions:
          - errorMessage: Nur positive Zahlenwerte
            terms:
              - P >= 0
      - id: G
        name: Größe
        type: TEXT
        allowEmpty: true
        datatype: INTEGER
        restrictions:
          - errorMessage: Nur positive Zahlenwerte
            terms:
              - Number.isNaN(G.value) || G.getValue() >= 0   # Number.isNaN() erforderlich, da Feld leer sein kann und Restriktionen dadurch auch bei leerem Feld geprüft werden (konvertiert zu NaN)
    reactions:
      - if(entry.get('A').value === 'Allokation')
      - entry.get('G').setEnabled(true);
      - else if(entry.get('A').value === 'Freigabe')
      - entry.get('G').clear().setEnabled(false);
    style:
      row: 1
      column: 1
  - id: W
    name: Wartetabelle
    explanation: Liste der durchzuführenden Allokationen und Freigaben
    type: TABLE
    allowEmpty: true
    restrictions:
      - errorMessage: Bei der Allokation von Speicher ist die zu allokierende Größe anzugeben, bei der Freigabe ist keine Größe anzugeben
        terms:
          - |
            ((entry.get('A').getValue() === 'Allokation') && !entry.get('G').isEmpty()) ||
            ((entry.get('A').getValue() === 'Freigabe') && entry.get('G').isEmpty())
    initialEntries: 1
    innerFields:
      - id: A
        name: Aktion
        type: SELECT
        emptyOption: true
        options:
          - id: Leer
            name: Bitte wählen
          - id: Allokation
          - id: Freigabe
      - id: P
        name: Prozess
        type: TEXT
        datatype: INTEGER
        restrictions:
          - errorMessage: Nur positive Zahlenwerte
            terms:
              - P >= 0
      - id: G
        name: Größe
        type: TEXT
        allowEmpty: true
        datatype: INTEGER
        restrictions:
          - errorMessage: Nur positive Zahlenwerte
            terms:
              - Number.isNaN(G.value) || G.getValue() >= 0   # Number.isNaN() erforderlich, da Feld leer sein kann und Restriktionen dadurch auch bei leerem Feld geprüft werden (konvertiert zu NaN)
    reactions:
      - if(entry.get('A').value === 'Allokation')
      - entry.get('G').setEnabled(true);
      - else if(entry.get('A').value === 'Freigabe')
      - entry.get('G').clear().setEnabled(false);
    style:
      row: 1
      column: 2
  - id: S
    name: Speichertabelle
    explanation: Aktuelle Bitmap zur Speicherverwaltung
    usage: OUTPUT
    type: TABLE
    growthDirection: HORIZONTAL
    initialEntries: 32
    innerFields:
      - id: 'N'
        name: Nummer
        explanation: Nummer der Speicherzelle
        usage: OUTPUT
        type: TEXT
        datatype: INTEGER
      - id: Z
        name: Zustand
        explanation: Aktuelle Verfügbarkeit der Speicherzelle, 0 für unbelegt, 1 für belegt
        type: TEXT
        usage: INPUT
        datatype: INTEGER
        restrictions:
          - errorMessage: Zustand muss 0 (unbelegt) oder 1 (belegt) sein
            terms:
              - Z.equals(0) || Z.equals(1)
      - id: P
        name: Prozess
        explanation: Prozess, der die Speicherzelle aktuell belegt
        usage: INPUT
        type: TEXT
        datatype: INTEGER
        restrictions:
          - errorMessage: Nur positive Zahlenwerte
            terms:
              - P >= 0
    style:
      row: 2
      column: 1
      width: 2
  - id: 'V'
    name: Index-Von
    explanation: Speicherzellennummer, ab der allokiert bzw. freigegeben werden soll
    usage: TEMP
    type: TEXT
    datatype: INTEGER
    style:
      row: 3
      column: 1
  - id: 'B'
    name: Index-Bis
    explanation: Speicherzellennummer, bis zu der allokiert bzw. freigegeben werden soll
    usage: TEMP
    type: TEXT
    datatype: INTEGER
    style:
      row: 3
      column: 2

states:
  - id: Z0
    name: Lernmodul initialisiert
    type: ENTRY
    actions:
      - S.withEmptyEntries().forEach((field, index) => field.get("N").value = index)
    transitions:
      - target: Z1
  - id: Z1
    name: Iteration über Wartetabelle neugestartet
    importance: ZERO
    actions:
      - W.restartIterator()
    transitions:
      - target: Z2
  - id: Z2
    name: Aktueller Eintrag definiert
    importance: LOW
    actions:
      - X.value = W.next()
      - if (X.value !== undefined) X.value = X.value.valueOf()
    transitions:
      - target: Z11
        conditions:
          - terms:
              - W.isAtEnd()
      - target: Z3a
        conditions:
          - terms:
              - X.value.get("A") === "Freigabe"
      - target: Z3b
        conditions:
          - terms:
              - X.value.get("A") === "Allokation"
  - id: Z3a
    name: Aktueller Eintrag allokiert?
    type: JUNCTION
    transitions:
      - target: Z2
      - target: Z5a
        conditions:
          - terms:
              - Own.prozessAllokiert()
  - id: Z3b
    name: Aktueller Eintrag allokierbar?
    type: JUNCTION
    transitions:
      - target: Z2
      - target: Z4b
        conditions:
          - terms:
              - Own.speicherVerfügbar()
  - id: Z4b
    name: Iteration über Speicher neugestartet
    importance: ZERO
    actions:
      - S.restartIterator()
    transitions:
      - target: Z5b
  - id: Z5a
    name: Von-Index definiert
    importance: LOW
    actions:
      - V.value = Own.findeProzessStart()
    transitions:
      - target: Z7a
  - id: Z5b
    name: Von-Index definiert
    importance: LOW
    actions:
      - V.value = Own.findeZustand(0)
    transitions:
      - target: Z6b
  - id: Z6b
    name: Bis-Index gefunden
    importance: LOW
    actions:
      - B.value = Own.findeZustand(1)
    transitions:
      - target: Z5b
      - target: Z7b
        conditions:
          - terms:
              - (B - V) >= X.value.get("G")
  - id: Z7a
    name: Bis-Index definiert
    importance: LOW
    actions:
      - B.value = Own.findeProzessEnde()
    transitions:
      - target: Z8a
  - id: Z7b
    name: Bis-Index definiert
    importance: LOW
    actions:
      - B.value = V + X.value.get("G")
    transitions:
      - target: Z8b
  - id: Z8a
    name: Speicherbereich freigegeben
    importance: LOW
    actions:
      - Own.speicherSetzen(0, 0)
    transitions:
      - target: Z9
  - id: Z8b
    name: Speicherbereich allokiert
    importance: LOW
    actions:
      - Own.speicherSetzen(1, X.value.get("P"))
    transitions:
      - target: Z9
  - id: Z9
    name: Aktueller Eintrag aus Wartetabelle entfernt
    importance: HIGH
    actions:
      - W.remove(X.value)
    transitions:
      - target: Z2
  - id: Z11
    name: Iteration über Ereignistabelle neugestartet
    importance: ZERO
    actions:
      - E.restartIterator()
    transitions:
      - target: Z12
  - id: Z11a
    name: Aktuellen Eintrag am Anfang der Wartetabelle eingeschoben
    importance: HIGH
    actions:
      - W.insert(0, X.value)
    transitions:
      - target: Z12
  - id: Z11b
    name: Aktuellen Eintrag am Ende der Wartetabelle angehangen
    importance: HIGH
    actions:
      - W.add(X.value)
    transitions:
      - target: Z12
  - id: Z12
    name: Aktueller Eintrag definiert
    importance: LOW
    actions:
      - X.value = E.next()
      - if (X.value !== undefined) X.value = X.value.valueOf()
    transitions:
      - target: Z19
      - target: Z20
        conditions:
          - terms:
              - E.isAtEnd()
  - id: Z19
    name: Aktueller Eintrag aus Ereignistabelle entfernt
    importance: LOW
    actions:
      - E.remove(X.value)
    transitions:
      - target: Z13a
        conditions:
          - terms:
              - X.value.get("A") === "Freigabe"
      - target: Z13b
        conditions:
          - terms:
              - X.value.get("A") === "Allokation"
  - id: Z13a
    name: Aktueller Eintrag allokiert?
    type: JUNCTION
    transitions:
      - target: Z11a
      - target: Z15a
        conditions:
          - terms:
              - Own.prozessAllokiert()
  - id: Z13b
    name: Aktueller Eintrag allokierbar?
    type: JUNCTION
    transitions:
      - target: Z11b
      - target: Z14b
        conditions:
          - terms:
              - Own.speicherVerfügbar()
  - id: Z14b
    name: Iteration über Speicher neugestartet
    importance: ZERO
    actions:
      - S.restartIterator()
    transitions:
      - target: Z15b
  - id: Z15a
    name: Von-Index definiert
    importance: LOW
    actions:
      - V.value = Own.findeProzessStart()
    transitions:
      - target: Z17a
  - id: Z15b
    name: Von-Index definiert
    importance: LOW
    actions:
      - V.value = Own.findeZustand(0)
    transitions:
      - target: Z16b
  - id: Z16b
    name: Bis-Index gefunden
    importance: LOW
    actions:
      - B.value = Own.findeZustand(1)
    transitions:
      - target: Z15b
      - target: Z17b
        conditions:
          - terms:
              - (B - V) >= X.value.get("G")
  - id: Z17a
    name: Bis-Index definiert
    importance: LOW
    actions:
      - B.value = Own.findeProzessEnde()
    transitions:
      - target: Z18a
  - id: Z17b
    name: Bis-Index definiert
    importance: LOW
    actions:
      - B.value = V + X.value.get("G")
    transitions:
      - target: Z18b
  - id: Z18a
    name: Speicherbereich freigegeben
    importance: HIGH
    actions:
      - Own.speicherSetzen(0, 0)
    transitions:
      - target: Z1
  - id: Z18b
    name: Speicherbereich allokiert
    importance: HIGH
    actions:
      - Own.speicherSetzen(1, X.value.get("P"))
    transitions:
      - target: Z1
  - id: Z20
    name: Modul abgeschlossen
    importance: HIGH