# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: Dreisatz
  explanation: Interaktives Modul, um den Dreisatz auszuprobieren
  settings:
    lemosVersion: 2.2.0

fields:
  - id: LS
    name: Linker Startwert
    explanation: Ausgangswert für den der Endwert bekannt ist
    type: TEXT
    usage: INPUT
    datatype: NUMBER
    style:
      row: 1
      column: 1
      width: 2
  - id: RS
    name: Rechter Startwert
    explanation: Ausgangswert für den der Endwert unbekannt ist
    type: TEXT
    usage: INPUT
    datatype: NUMBER
    style:
      row: 1
      column: 3
      width: 2
  - id: T
    name: Teiler
    explanation: Gemeinsamer Teiler, um auf jeweiligen Zwischenwert zu kommen
    type: TEXT
    usage: TEMP
    style:
      row: 2
      column: 2
      width: 2
  - id: LZ
    name: Linker Zwischenwert
    explanation: Zwischenwert für den der Endwert bekannt ist
    type: TEXT
    usage: TEMP
    style:
      row: 3
      column: 1
      width: 2
  - id: RZ
    name: Rechter Zwischenwert
    explanation: Zwischenwert für den der Endwert unbekannt ist
    type: TEXT
    usage: TEMP
    style:
      row: 3
      column: 3
      width: 2
  - id: F
    name: Faktor
    explanation: Gemeinsamer Faktor, um auf den jeweiligen Endwert zu kommen
    type: TEXT
    usage: TEMP
    style:
      row: 4
      column: 2
      width: 2
  - id: LE
    name: Linker Endwert
    explanation: Gegebender Endwert
    type: TEXT
    usage: INPUT
    datatype: NUMBER
    style:
      row: 5
      column: 1
      width: 2
  - id: RE
    name: Rechter Endwert
    explanation: Gesuchter Endwert
    type: TEXT
    usage: OUTPUT
    style:
      row: 5
      column: 3
      width: 2
    
states:
  - id: Z0
    name: Lernmodul initialisiert
    type: ENTRY
    transitions:
      - target: Z1
        conditions:
          - errorMessage: |
                      Bitte die folgenden Felder befüllen:
                      - Linker Startwert
                      - Rechter Startwert
                      - Linker Endwert
            terms:
              - Fields.areFilled(LS, RS, LE)
  - id: Z1
    name: Teiler bestimmt
    importance: LOW
    actions:
      - T.value = LS.value
    transitions:
      - target: Z2
  - id: Z2
    name: Linker und Rechter Zwischenwert berechnet
    importance: HIGH
    actions:
      - LZ.setValue(LS.getValue() / T.getValue())
      - RZ.setValue(RS.getValue() / T.getValue())
    transitions:
      - target: Z3
  - id: Z3
    name: Faktor bestimmt
    importance: LOW
    actions:
      - F.value = LE.value
    transitions:
      - target: Z4
  - id: Z4
    name: Rechter Endwert berechnet
    importance: HIGH
    actions:
      - RE.setValue(RZ.getValue() * F.getValue())

    
