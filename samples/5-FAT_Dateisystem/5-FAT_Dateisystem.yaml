# yaml-language-server: $schema=../LeMoS-Modul-Schema.json
general:
  heading: FAT-Dateisystem
  explanation: Finden der Blöcke einer Datei in einem FAT-Dateisystem, um die Größe der Datei zu berechnen
  settings:
    lemosVersion: 2.2.0

fields:
  - id: 'F'
    name: FAT-Tabelle
    explanation: Ausschnitt aus der FAT-Tabelle des Dateisystems
    type: TABLE
    usage: INPUT
    growthDirection: VERTICAL
    initialEntries: 10
    innerFields:
      - id: 'I'
        name: Index
        type: TEXT
        usage: INPUT
        datatype: STRING
      - id: 'N'
        name: Blocknummer
        type: TEXT
        usage: INPUT
        datatype: STRING
    style:
      row: 1
      column: 1
      height: 4
  - id: S
    name: Startblock
    explanation: Block bei dem die gesuchte Datei anfängt
    type: TEXT
    usage: INPUT
    datatype: INTEGER
    style:
      row: 1
      column: 2
  - id: BG
    name: Blockgröße (in kB)
    explanation: Größe eines einzelnen Blocks im Dateisystem
    type: TEXT
    usage: INPUT
    datatype: INTEGER
    style:
      row: 1
      column: 3
  - id: A
    name: Aktueller Block
    explanation: Aktuell betrachteter Block der FAT-Tabelle
    type: TEXT
    usage: TEMP
    style:
      row: 2
      column: 2
      width: 2
  - id: B
    name: Blöcke
    explanation: Nummern der Blöcke der gesuchten Datei
    type: LIST
    usage: OUTPUT
    style:
      row: 3
      column: 2
      width: 2
  - id: L
    name: Länge
    explanation: Anzahl der Blöcke, aus denen die gesuchte Datei besteht
    type: TEXT
    usage: OUTPUT
    style:
      row: 4
      column: 2
  - id: DG
    name: Startblock (in kB)
    explanation: Größe der gesuchten Datei
    type: TEXT
    usage: OUTPUT
    style:
      row: 4
      column: 3

states:
  - id: Z0
    name: Lernmodul initialisiert
    type: ENTRY
    transitions:
      - target: Z1
        conditions:
          - errorMessage: |
                      Bitte die folgenden Felder befüllen:
                      - FAT-Tabelle
                      - Startblock
                      - Blockgröße
            terms:
              - Fields.areFilled(F, S, BG)
  - id: Z1
    name: Aktueller Block initialisiert
    importance: HIGH
    actions:
      - A.value = S.value
    transitions:
      - target: Z2
  - id: Z2
    name: Aktueller Block zu Blockliste hinzugefügt
    importance: LOW
    actions:
      - B.add(A.value)
    transitions:
      - target: Z3
  - id: Z3
    name: Aktueller Block definiert
    importance: HIGH
    actions:
      - let block = F.findByAttribute("I", A.value)
      - A.value = block.get("N").value
    transitions:
      - target: Z2
      - target: Z4
        explanation: Wenn letzter Block gefunden wurde, wird mit der Berechnung von Länge und Dateigröße fortgefahren
        conditions:
          - terms:
              - A.value === "EOF"
  - id: Z4
    name: Länge berechnet
    importance: LOW
    actions:
      - L.value = B.getLength()
    transitions:
      - target: Z5
  - id: Z5
    name: Dateigröße berechnet
    importance: HIGH
    actions:
      - DG.value = L * BG

